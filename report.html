
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Contest Leaderboard</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-gold: #ffd700;
            --accent-silver: #c0c0c0;
            --accent-bronze: #cd7f32;
            --accent-blue: #3498db;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .timestamp {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: var(--accent-blue);
        }
        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .leaderboard {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #404040;
        }
        th {
            background-color: #333;
            color: var(--text-secondary);
            font-weight: 600;
        }
        tr:hover {
            background-color: #383838;
        }
        .rank-1 { color: var(--accent-gold); font-weight: bold; }
        .rank-2 { color: var(--accent-silver); font-weight: bold; }
        .rank-3 { color: var(--accent-bronze); font-weight: bold; }
        
        .profile-link {
            color: var(--accent-blue);
            text-decoration: none;
        }
        .profile-link:hover {
            text-decoration: underline;
        }
        .trend-up { color: #2ecc71; }
        .trend-down { color: #e74c3c; }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            td, th { padding: 10px 5px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LeetCode Contest Tracker</h1>
            <div class="timestamp">Last Updated: 2026-01-11 14:00:51</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">1</div>
                <div class="stat-label">Students Tracked</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">3686.0</div>
                <div class="stat-label">Average Rating</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">3686</div>
                <div class="stat-label">Top Rating</div>
            </div>
        </div>

        <table class="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Student</th>
                    <th>Rating</th>
                    <th>Global Rank</th>
                    <th>Contests</th>
                    <th>% Attend</th>
                </tr>
            </thead>
            <tbody>
                
        <tr>
            <td class="rank-1">1</td>
            <td><a href="https://leetcode.com/u/neal_wu/" target="_blank" class="profile-link">neal_wu</a></td>
            <td>3686</td>
            <td>2</td>
            <td>51</td>
            <td>0.01%</td>
        </tr>
        
            </tbody>
        </table>
    </div>
</body>
</html>
